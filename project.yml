name: Quay

options:
  bundleIdPrefix: io.github.babul
  xcodeVersion: "26.2"
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  defaultConfig: Debug
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    EXCLUDED_ARCHS[sdk=macosx*]: x86_64
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    DEAD_CODE_STRIPPING: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: NO
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    MARKETING_VERSION: "0.2.2"
    CURRENT_PROJECT_VERSION: "5"
    DEVELOPMENT_TEAM: T5F5K95U46
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    LOCALIZATION_PREFERS_STRING_CATALOGS: YES
    STRING_CATALOG_GENERATE_SYMBOLS: YES
  configs:
    Debug:
      SWIFT_OPTIMIZATION_LEVEL: -Onone
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
      ONLY_ACTIVE_ARCH: YES
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_IDENTITY: "-"
    Release:
      SWIFT_OPTIMIZATION_LEVEL: -O
      ONLY_ACTIVE_ARCH: YES
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: "Developer ID Application"

configs:
  Debug: debug
  Release: release

packages:
  ComposableArchitecture:
    url: https://github.com/pointfreeco/swift-composable-architecture
    from: "1.17.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  Quay:
    type: application
    platform: macOS
    info:
      path: Quay/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSHumanReadableCopyright: "Copyright (c) 2026 Babul A. Mukherjee"
        LSMinimumSystemVersion: "15.0"
        NSLocalNetworkUsageDescription: "Quay connects to SSH servers on your local and private networks."
        NSPrincipalClass: NSApplication
        LSApplicationCategoryType: public.app-category.developer-tools
        SUFeedURL: "https://babul.github.io/quay/appcast.xml"
        SUPublicEDKey: "x35nHbgxnJg4dlg7Mu4y04qaIeiV4o4d0L6jR9iZ8AY="
        SUEnableInstallerLauncherService: false
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: io.github.babul.quay.bundle
            UTTypeDescription: Quay Settings Bundle
            UTTypeConformsTo:
              - public.data
            UTTypeTagSpecification:
              public.filename-extension:
                - quaybundle
    sources:
      - path: Quay
        excludes:
          - "Quay-Bridging-Header.h"
          - "Resources/**"
      - path: Quay/Resources/Assets.xcassets
        buildPhase: resources
        optional: true
      - path: Quay/Resources/default-ghostty.conf
        buildPhase: resources
        optional: true
      - path: Quay/Resources/ghostty
        buildPhase: resources
        type: folder
        optional: true
      - path: Quay/Resources/terminfo
        buildPhase: resources
        type: folder
        optional: true
    settings:
      base:
        ENABLE_HARDENED_RUNTIME: YES
        PRODUCT_MODULE_NAME: Quay
        SWIFT_OBJC_BRIDGING_HEADER: Quay/Quay-Bridging-Header.h
        FRAMEWORK_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/Frameworks
        OTHER_LDFLAGS:
          - $(inherited)
          - -lc++
          - -liconv
        CLANG_CXX_LIBRARY: libc++
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: io.github.babul.quay.debug
          PRODUCT_NAME: "Quay (Debug)"
          ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon-Debug
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: io.github.babul.quay
          PRODUCT_NAME: Quay
          ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: ComposableArchitecture
        product: ComposableArchitecture
      - target: QuayAskpass
        copy:
          destination: executables
      - package: Sparkle
        product: Sparkle
      - framework: Frameworks/GhosttyKit.xcframework
        embed: false
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: QuartzCore.framework
      - sdk: CoreText.framework
      - sdk: CoreGraphics.framework
      - sdk: AppKit.framework
      - sdk: AudioToolbox.framework
      - sdk: UserNotifications.framework
      - sdk: OSLog.framework
      - sdk: Carbon.framework
    scheme:
      testTargets:
        - QuayTests
      gatherCoverageData: true

  QuayAskpass:
    type: tool
    platform: macOS
    sources:
      - path: QuayAskpass
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.babul.quay.askpass
        PRODUCT_NAME: quay-askpass
        SKIP_INSTALL: NO
        INSTALL_PATH: $(LOCAL_APPS_DIR)
        ENABLE_HARDENED_RUNTIME: YES

  QuayTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: QuayTests
    dependencies:
      - target: Quay
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.babul.quay.tests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: $(TEST_HOST)
      configs:
        Debug:
          TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Quay (Debug).app/Contents/MacOS/Quay (Debug)"
        Release:
          TEST_HOST: $(BUILT_PRODUCTS_DIR)/Quay.app/Contents/MacOS/Quay
