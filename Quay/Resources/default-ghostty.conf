# Bundled base config loaded before the user's ~/.config/ghostty/config.
# User settings always win; this only applies when a key is not set by the user.

font-family = "SF Mono"
font-size = 13
theme = default
cursor-style = block
cursor-style-blink = false
window-padding-x = 8
window-padding-y = 6
scrollback-limit = 100000
