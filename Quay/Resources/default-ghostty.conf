# Default Ghostty config used when the user has no `~/.config/ghostty/config`.
# Wired up in Step 3 (`GhosttyApp.loadConfig`).
#
# Keep this minimal so users who have customized Ghostty get their own settings,
# and users who haven't get something sensible.

font-family = "SF Mono"
font-size = 13
theme = default
cursor-style = block
cursor-style-blink = false
window-padding-x = 8
window-padding-y = 6
scrollback-limit = 100000
